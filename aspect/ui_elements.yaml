ui_elements:
  - id: favicon
    description: Website favicon icon
    source_file: public/index.html
    source_path: /workspace/app/public/index.html
  - id: apple_touch_icon
    description: Apple touch icon for iOS devices
    source_file: public/index.html
    source_path: /workspace/app/public/index.html
  - id: noscript_message
    description: Message shown when JavaScript is disabled
    label: You need to enable JavaScript to run this app.
    source_file: public/index.html
    source_path: /workspace/app/public/index.html
  - id: root_container
    description: Main application root container div
    source_file: public/index.html
    source_path: /workspace/app/public/index.html
  - id: animated_title
    label: Todo App
    description: Animated h1 header with spring animation and hover scaling effect
    source_file: src/App.js
    source_path: /workspace/app/src/App.js
  - id: animated_container
    description: Motion div container with spring animation from bottom
    source_file: src/App.js
    source_path: /workspace/app/src/App.js
  - id: filter_button_active
    label: Active
    description: Animated button to filter active todos
    animations:
      - hover: scale 1.1
      - tap: scale 0.9
    source_file: src/components/DisplayTodos.js
    source_path: /workspace/app/src/components/DisplayTodos.js
  - id: filter_button_completed
    label: Completed
    description: Animated button to filter completed todos
    animations:
      - hover: scale 1.1
      - tap: scale 0.9
    source_file: src/components/DisplayTodos.js
    source_path: /workspace/app/src/components/DisplayTodos.js
  - id: filter_button_all
    label: All
    description: Animated button to show all todos
    animations:
      - hover: scale 1.1
      - tap: scale 0.9
    source_file: src/components/DisplayTodos.js
    source_path: /workspace/app/src/components/DisplayTodos.js
  - id: todo_list
    description: Animated list container for todo items
    source_file: src/components/DisplayTodos.js
    source_path: /workspace/app/src/components/DisplayTodos.js
